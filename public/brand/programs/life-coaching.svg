<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2c3a"/>
      <stop offset="100%" stop-color="#0d4455"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#4B7E8C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a2c3a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <rect width="600" height="400" fill="url(#glow)"/>
  <!-- Líneas geométricas sutiles -->
  <circle cx="420" cy="90" r="160" fill="none" stroke="#4B7E8C" stroke-width="0.6" opacity="0.25"/>
  <circle cx="420" cy="90" r="120" fill="none" stroke="#4B7E8C" stroke-width="0.6" opacity="0.18"/>
  <circle cx="420" cy="90" r="80"  fill="none" stroke="#A58D66" stroke-width="0.8" opacity="0.22"/>
  <!-- Punto brillante -->
  <circle cx="420" cy="90" r="5" fill="#A58D66" opacity="0.6"/>
  <!-- Línea horizontal decorativa -->
  <line x1="40" y1="340" x2="240" y2="340" stroke="#A58D66" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="346" x2="140" y2="346" stroke="#4B7E8C" stroke-width="0.6" opacity="0.2"/>
  <!-- Texto marca de agua -->
  <text x="40" y="370" font-family="Georgia, serif" font-size="11" fill="#A58D66" opacity="0.35" letter-spacing="4">JEWGAL ACADEMY</text>
</svg>
